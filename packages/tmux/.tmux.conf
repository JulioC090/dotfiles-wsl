set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Global settings
set -g default-terminal "screen-256color"

set -g default-command "${SHELL}"

set -g mouse on
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'

set-option -g history-limit 50000

set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

set -g @continuum-restore 'on'


# Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}"

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g @catppuccin_directory_text " #{pane_current_path}"


# Binds
unbind r
bind r source-file ~/.tmux.conf

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key M-h resize-pane -L 5
bind-key M-j resize-pane -D 5
bind-key M-k resize-pane -U 5
bind-key M-l resize-pane -R 5
bind-key m resize-pane -Z 5

unbind %
unbind '\'
bind '\' split-window -h -c "#{pane_current_path}"

unbind '"'
unbind -
bind - split-window -v -c "#{pane_current_path}"


# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'noscript/tmux-mighty-scroll'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'laktak/tome'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

run '~/.tmux/plugins/tpm/tpm'

